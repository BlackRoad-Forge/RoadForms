services:
  postgres:
    image: pgvector/pgvector:pg17
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: arjenz/mailhog
    ports:
      - 8025:8025
      - 1025:1025

  valkey:
    image: valkey/valkey@sha256:12ba4f45a7c3e1d0f076acd616cb230834e75a77e8516dde382720af32832d6d
    command: "valkey-server"
    ports:
      - 6379:6379
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=devminio
      - MINIO_ROOT_PASSWORD=devminio123
    ports:
      - "9000:9000" # S3 API direct access
      - "9001:9001" # Web console
    volumes:
      - minio-data:/data

  inngest:
    profiles: ["inngest-poc"]
    image: inngest/inngest
    command: "inngest start"
    ports:
      - 8288:8288
      - 8289:8289
    environment:
      - INNGEST_EVENT_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      - INNGEST_SIGNING_KEY=abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
      - INNGEST_POSTGRES_URI=postgres://postgres:postgres@postgres:5432/postgres
      - INNGEST_REDIS_URI=redis://valkey:6379
      - INNGEST_SDK_URL=http://inngest-poc-worker:8287/api/inngest
      - INNGEST_POLL_INTERVAL=60
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      inngest-poc-worker:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8288/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  inngest-poc-worker:
    profiles: ["inngest-poc"]
    build:
      context: .
      dockerfile: services/inngest-poc-worker/Dockerfile
    environment:
      - INNGEST_BASE_URL=http://inngest:8288
      - INNGEST_SIGNING_KEY=abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
      - PORT=8287
    ports:
      - 8287:8287
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8287/health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres:
    driver: local
  valkey-data:
    driver: local
  minio-data:
    driver: local
